<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowDeck · AI Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090a0e;--surface:#111318;--surface2:#181b22;--surface3:#1e2230;
  --border:#1e2235;--border2:#2a304a;--border3:#364060;
  --text:#d8ddef;--text2:#7a85a8;--text3:#404868;
  --accent:#0a84ff;--accent2:#5e5ce6;--green:#3ecb8e;--amber:#f0ad5e;--red:#f05858;
}

body.light-theme {
  --bg:#f5f5f7;--surface:#ffffff;--surface2:#f0f0f2;--surface3:#e5e5ea;
  --border:#d1d1d6;--border2:#c7c7cc;--border3:#aeaeae;
  --text:#1d1d1f;--text2:#86868b;--text3:#a1a1a6;
  --accent:#0a84ff;--accent2:#5e5ce6;--green:#3ecb8e;--amber:#f0ad5e;--red:#ff3b30;
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden;transition:background 0.3s,color 0.3s;}
#app{display:flex;flex-direction:column;height:100vh}

#topbar{
  display:none; /* Hidden because React controls it */
}

/* main layout */
#main{display:flex;flex:1;overflow:hidden}

/* explain panel */
#explain-panel{
  position:fixed;bottom:20px;left:20px;z-index:400;
  background:var(--surface);backdrop-filter:blur(16px);
  border:1px solid var(--border2);border-radius:20px;
  max-width:360px;width:auto;min-width:220px;
  box-shadow:0 12px 28px rgba(0,0,0,.5);
  pointer-events:auto;
  transition:all .2s ease;
  font-family:'Syne',sans-serif;
  display: none;
}
.explain-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid var(--border2);
  color:var(--accent);font-size:11px;font-weight:600;letter-spacing:.4px;
}
.explain-header button{
  background:transparent;border:none;color:var(--text3);cursor:pointer;
  font-size:16px;padding:0 4px;
}
.explain-content{
  padding:14px 16px;
  font-size:13px;line-height:1.5;color:var(--text);
  word-break:break-word;
  max-height: 400px;
  overflow-y: auto;
}
.explain-title{
  font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px;
}
.explain-title span{
  background:var(--surface3);padding:2px 8px;border-radius:20px;font-size:10px;
  font-family:'JetBrains Mono',monospace;color:var(--text2);
}
.explain-text{
  color:var(--text2);
  margin-top:8px;
  border-left:2px solid var(--accent);
  padding-left:12px;
  font-style:normal;
  white-space: pre-wrap;
}
#explain-close{opacity:.7;transition:.1s}
#explain-close:hover{opacity:1;color:var(--red)}

/* canvas */
#canvas-wrap{
  flex:1;position:relative;overflow:hidden;
  background:var(--bg);cursor:grab;
  touch-action:none;-webkit-user-select:none;user-select:none
}
#canvas-wrap.grabbing{cursor:grabbing}
#canvas-wrap::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle,#1e2440 1px,transparent 1px);
  background-size:28px 28px;pointer-events:none;z-index:0;
  opacity:.6
}
#canvas-wrap::after{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle, var(--accent) 1.5px, transparent 1.5px);
  background-size:28px 28px;pointer-events:none;z-index:1;
  mask-image: radial-gradient(350px circle at var(--mouse-x, -100%) var(--mouse-y, -100%), black, transparent);
  -webkit-mask-image: radial-gradient(350px circle at var(--mouse-x, -100%) var(--mouse-y, -100%), black, transparent);
  opacity: .95;
  transition: opacity 0.2s;
}
#world{
  position:absolute;top:0;left:0;
  transform-origin:0 0;
  will-change:transform;
  z-index:2
}
#edge-svg{
  position:absolute;top:0;left:0;
  pointer-events:none;overflow:visible;z-index:0;
}
.block-node{
  position:absolute; z-index:2;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:14px;
  min-width:170px;max-width:240px;
  cursor:grab;
  transition:border-color .18s,box-shadow .18s,transform .1s;
  user-select:none;
  backdrop-filter:blur(4px)
}
.block-node:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 8px 28px rgba(79,126,240,.18)}
.block-node.dragging{cursor:grabbing;z-index:999;box-shadow:0 0 0 1.5px var(--accent),0 16px 40px rgba(0,0,0,.6)}

/* SHAPES! */
.block-node.shape-circle {
  border-radius: 50%;
  aspect-ratio: 1/1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-width: 200px; height: 200px;
}
.block-node.shape-circle .node-head { border-radius: 50% 50% 0 0; border: none; background: transparent !important; justify-content: center; padding-top:20px; }
.block-node.shape-circle .node-badge { display: none; }
.block-node.shape-circle .node-addr { text-align: center; font-size: 11px; }

.block-node.shape-star {
  clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
  border-radius: 0; min-width: 240px; min-height: 240px;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  background: var(--surface); border: none; padding: 40px;
}
.block-node.shape-star .node-head { background: transparent !important; border:none; }
.block-node.shape-star .node-badge { display: none; }

.block-node.shape-text-field {
  border-radius: 8px; background: var(--surface2); 
  min-width: 320px; max-width: 800px; text-align: left;
}
.block-node.shape-text-field .node-head {
  justify-content: space-between; border-bottom: 2px solid var(--border3);
  background: transparent !important; padding: 10px 14px;
}
.block-node.shape-text-field .node-addr { font-size: 14px; font-weight: 700; color: var(--text) !important; font-family: 'Syne', sans-serif; text-align: left; }
.block-node.shape-text-field .node-badge { display: none; }
.block-node.shape-text-field .node-body { align-items: flex-start; padding: 18px; }
.block-node.shape-text-field .node-content { text-align: left; font-size: 15px; font-family: 'JetBrains Mono', monospace; line-height: 1.6; color: var(--text2); }
.tf-speak-btn { background: transparent; border: none; cursor: pointer; font-size: 15px; opacity: 0.7; transition: .2s; }
.tf-speak-btn:hover { opacity: 1; transform: scale(1.1); }

.node-head{
  padding:8px 11px 7px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:7px;border-radius:13px 13px 0 0
}
.node-badge{
  width:22px;height:22px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-size:8.5px;font-weight:700;flex-shrink:0;color:#fff;
  font-family:'JetBrains Mono',monospace
}
.node-addr{font-size:9px;font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.node-body{padding:9px 11px; display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1;}
.node-content{font-size:12px;line-height:1.5;color:var(--text);word-break:break-word;text-align:center}
.node-explanation-badge{
  margin-top:8px;
  padding:4px 8px;
  background:rgba(79,126,240,.12);
  border-radius:18px;
  font-size:9px;
  color:var(--accent);
  text-align:center;
  cursor:pointer;
  display:inline-block;
  font-family:'JetBrains Mono',monospace;
  transition:.1s;
}
.node-explanation-badge:hover{
  background:rgba(79,126,240,.3);
  text-decoration:underline;
}
#minimap{
  position:absolute;bottom:16px;right:16px;z-index:300;
  width:160px;height:110px;
  background:var(--surface);
  border:1px solid var(--border2);border-radius:10px;
  overflow:hidden;cursor:pointer;
  backdrop-filter:blur(8px)
}
#minimap canvas{display:block;width:100%;height:100%}
#minimap-label{
  position:absolute;top:6px;left:8px;
  font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;pointer-events:none
}
#float-controls{
  position:absolute;bottom:140px;right:16px;transform:none;
  z-index:300;display:flex;flex-direction:column;gap:6px;
  background:var(--surface);border:1px solid var(--border2);border-radius:10px;
  padding:8px 6px;backdrop-filter:blur(8px)
}
.fc-btn{
  width:32px;height:32px;border-radius:7px;border:1px solid var(--border2);
  background:transparent;color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;transition:.15s all;font-family:inherit
}
.fc-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border3)}
.fc-btn:active{transform:scale(.93)}
.fc-btn.accent{background:var(--accent);border-color:var(--accent);color:#fff}
@keyframes nodeIn{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}
@keyframes nodePulse{from{box-shadow: 0 0 0 0 rgba(10,132,255,0.4); border-color:var(--accent);} to{box-shadow: 0 0 0 10px rgba(10,132,255,0); border-color:#fff;}}

/* ===== CODER BLOCK ===== */
.block-node.shape-coder {
  min-width: 480px; max-width: 800px; border-radius: 12px;
  background: #0d1117; border: 1px solid #30363d;
}
.coder-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; border-bottom: 1px solid #30363d;
  background: #161b22; border-radius: 12px 12px 0 0;
}
.coder-lang { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.coder-label { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
.coder-body { padding: 0; overflow: visible; }
.coder-table { width: 100%; border-collapse: collapse; }
.coder-line { display: flex; align-items: flex-start; line-height: 1.65; transition: background 0.2s; }
.coder-line.active { background: rgba(10, 132, 255, 0.15); }
.coder-line-num {
  width: 46px; text-align: right; padding: 2px 12px 2px 8px;
  color: #484f58; font-size: 13px; font-family: 'JetBrains Mono', monospace;
  user-select: none; flex-shrink: 0; border-right: 1px solid #21262d;
}
.coder-line-code {
  flex: 1; padding: 2px 14px; font-size: 14px; font-family: 'JetBrains Mono', monospace;
  color: #c9d1d9; white-space: pre; tab-size: 4;
}
.coder-pointer {
  width: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.coder-pointer .arrow { display: none; color: var(--accent); font-size: 10px; }
.coder-line.active .coder-pointer .arrow { display: block; animation: pointerPulse 1s ease infinite; }
@keyframes pointerPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ===== VISUALIZER BLOCK ===== */
.block-node.shape-visualizer {
  min-width: 340px; max-width: 420px; border-radius: 12px;
  background: #0d1117; border: 1px solid #30363d;
}
.viz-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; border-bottom: 1px solid #30363d;
  background: #161b22; border-radius: 12px 12px 0 0;
}
.viz-title { font-size: 10px; color: var(--green); font-weight: 600; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; }
.viz-step-counter { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
.viz-body { padding: 14px; min-height: 80px; }
.viz-desc { font-size: 13px; color: var(--text); line-height: 1.55; margin-bottom: 12px; font-family: 'Syne', sans-serif; }
.viz-vars { display: flex; flex-direction: column; gap: 6px; }
.viz-var {
  display: flex; align-items: center; gap: 8px; padding: 6px 10px;
  background: #161b22; border-radius: 8px; border: 1px solid #21262d;
}
.viz-var-name { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--amber); font-weight: 600; min-width: 50px; }
.viz-var-eq { color: var(--text3); font-size: 11px; }
.viz-var-val { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--green); }
.viz-controls {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 14px; border-top: 1px solid #30363d;
}
.viz-btn {
  padding: 5px 14px; border-radius: 6px; border: 1px solid #30363d;
  background: #161b22; color: var(--text); font-size: 11px; cursor: pointer;
  font-family: 'JetBrains Mono', monospace; transition: all 0.15s;
}
.viz-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
.viz-btn:disabled { opacity: 0.3; cursor: default; }
.viz-btn:disabled:hover { background: #161b22; border-color: #30363d; color: var(--text); }

/* ===== GRAPHBLOCK ===== */
.block-node.shape-graphblock {
  min-width: 400px; max-width: 700px; border-radius: 12px;
  background: #0d1117; border: 1px solid #30363d;
}
.graph-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-bottom: 2px solid var(--accent);
  background: #161b22; border-radius: 12px 12px 0 0;
}
.graph-title { font-size: 13px; color: var(--text); font-weight: 700; font-family: 'Syne', sans-serif; }
.graph-icon { font-size: 11px; color: var(--accent); font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.graph-body { padding: 14px; height: 320px; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }

/* ===== OUTPUTER BLOCK ===== */
.block-node.shape-outputer {
  min-width: 320px; max-width: 600px; border-radius: 12px;
  background: #0d1117; border: 1px solid #30363d;
}
.out-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; border-bottom: 1px solid #30363d;
  background: #161b22; border-radius: 12px 12px 0 0;
}
.out-title { font-size: 10px; color: var(--red); font-weight: 600; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; }
.out-body {
  padding: 14px; overflow-y: visible;
  font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--green);
  white-space: pre-wrap; line-height: 1.6;
}
.out-cursor { display: inline-block; width: 7px; height: 14px; background: var(--green); animation: blink 1s step-end infinite; vertical-align: text-bottom; margin-left: 2px; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

/* ===== MATHBLOCK ===== */
.block-node.shape-mathblock {
  min-width: 480px; max-width: 800px; border-radius: 12px;
  background: #0d1117; border: 1px solid #30363d;
}
.math-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; border-bottom: 2px solid var(--amber);
  background: #161b22; border-radius: 12px 12px 0 0;
}
.math-title { font-size: 14px; font-weight: 700; color: var(--text); font-family: 'Syne', sans-serif; }
.math-icon { font-size: 12px; color: var(--amber); font-family: 'JetBrains Mono', monospace; font-weight: 600; }
.math-body { padding: 8px 0; overflow: visible; }
.math-step {
  display: flex; align-items: flex-start; gap: 0; padding: 12px 18px;
  border-bottom: 1px dashed #21262d; transition: background 0.15s;
}
.math-step:last-child { border-bottom: none; }
.math-step:hover { background: rgba(240, 173, 94, 0.05); }
.math-step-label {
  min-width: 80px; font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.4px; color: var(--amber); font-family: 'JetBrains Mono', monospace;
  padding-top: 4px; flex-shrink: 0;
}
.math-step-label.given { color: var(--accent); }
.math-step-label.answer { color: var(--green); }
.math-step-content {
  flex: 1; font-size: 16px; color: var(--text); line-height: 1.8;
  overflow-x: auto; padding: 2px 0;
}
.math-step-content .katex { font-size: 1.25em; }
.math-step-content .math-text { font-family: 'Syne', sans-serif; font-size: 14px; color: var(--text2); }
.math-footer {
  padding: 8px 16px; border-top: 2px solid var(--amber);
  display: flex; align-items: center; justify-content: space-between;
  background: #161b22; border-radius: 0 0 12px 12px;
}
.math-footer-text { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }

/* ===== DIABLOCK (Diagram Block) ===== */
.block-node.shape-diablock {
  min-width: 460px; max-width: 800px; border-radius: 12px;
  background: #0d1117; border: 1px solid #30363d;
}
.dia-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; border-bottom: 1px solid #30363d;
  background: #161b22; border-radius: 12px 12px 0 0;
}
.dia-title { font-size: 11px; font-weight: 700; color: var(--text); font-family: 'Syne', sans-serif; }
.dia-badge { font-size: 10px; color: #a78bfa; font-family: 'JetBrains Mono', monospace; font-weight: 600; }
.dia-controls {
  display: flex; align-items: center; gap: 6px;
}
.dia-play-btn, .dia-step-btn {
  width: 28px; height: 28px; border-radius: 6px; border: 1px solid #30363d;
  background: #161b22; color: var(--text); font-size: 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.dia-play-btn:hover, .dia-step-btn:hover { background: #a78bfa; border-color: #a78bfa; color: #fff; }
.dia-play-btn.playing { background: var(--red); border-color: var(--red); color: #fff; }
.dia-play-btn:disabled, .dia-step-btn:disabled { opacity: 0.3; cursor: default; }
.dia-canvas {
  width: 100%; min-height: 200px; position: relative; overflow: hidden;
  background: #0a0e14;
}
.dia-canvas svg { width: 100%; height: 100%; display: block; }
.dia-canvas svg .dia-node-box { fill: #1e293b; stroke: #475569; stroke-width: 1.5; rx: 6; transition: all 0.3s; }
.dia-canvas svg .dia-node-circle { fill: #1e293b; stroke: #475569; stroke-width: 1.5; transition: all 0.3s; }
.dia-canvas svg .dia-node-diamond { fill: #1e293b; stroke: #475569; stroke-width: 1.5; transition: all 0.3s; }
.dia-canvas svg .dia-node-text { fill: #e2e8f0; font-size: 13px; font-family: 'JetBrains Mono', monospace; text-anchor: middle; dominant-baseline: central; }
.dia-canvas svg .dia-node-label { fill: #94a3b8; font-size: 9px; font-family: 'JetBrains Mono', monospace; text-anchor: middle; }
.dia-canvas svg .dia-edge { stroke: #475569; stroke-width: 1.5; fill: none; transition: stroke 0.3s; }
.dia-canvas svg .dia-edge-arrow { fill: #475569; transition: fill 0.3s; }
.dia-canvas svg .dia-edge-label { fill: #64748b; font-size: 9px; font-family: 'JetBrains Mono', monospace; text-anchor: middle; }
.dia-canvas svg .highlight-node { stroke: #a78bfa; stroke-width: 2.5; filter: drop-shadow(0 0 6px rgba(167,139,250,0.5)); }
.dia-canvas svg .highlight-edge { stroke: #a78bfa; stroke-width: 2.5; }
.dia-canvas svg .highlight-edge-arrow { fill: #a78bfa; }
.dia-canvas svg .added-node { fill: #065f46; stroke: var(--green); stroke-width: 2.5; }
.dia-canvas svg .removed-node { fill: #7f1d1d; stroke: var(--red); stroke-width: 2.5; opacity: 0.6; }
.dia-canvas svg .modified-node { fill: #1e3a5f; stroke: var(--accent); stroke-width: 2.5; }
.dia-info {
  padding: 10px 14px; border-top: 1px solid #30363d;
  min-height: 36px; display: flex; align-items: center; gap: 8px;
}
.dia-step-label { font-size: 10px; color: #a78bfa; font-family: 'JetBrains Mono', monospace; font-weight: 600; min-width: 55px; }
.dia-step-desc { font-size: 12px; color: var(--text2); font-family: 'Syne', sans-serif; line-height: 1.4; }
.dia-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 14px; border-top: 1px solid #21262d;
  background: #161b22; border-radius: 0 0 12px 12px;
}
.dia-footer-text { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
@keyframes diaNodePop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>
<div id="app">
<div id="main">
  <div id="canvas-wrap">
    <div id="world"><svg id="edge-svg"></svg></div>
    <div id="minimap"><canvas id="mm-canvas"></canvas><div id="minimap-label">overview</div></div>
    <div id="float-controls" style="display:none;"></div>
  </div>
</div>
</div>

<div id="explain-panel">
  <div class="explain-header">
    <span>📖 EXPLANATION</span>
    <button id="explain-close">✕</button>
  </div>
  <div class="explain-content">
    <div class="explain-title"><span id="exp-target"></span></div>
    <div class="explain-text" id="exp-text"></div>
  </div>
</div>

<script>
// ---------- GLOBAL STATE ----------
let tx=0,ty=0,scale=1;
let isPanning=false,panStart={x:0,y:0};
let nodeData={};
let edges=[];
let nodeDragging=null,nodeDragOff={x:0,y:0};

function speakNodeText(text) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  window.speechSynthesis.speak(u);
}

// ===== CODE GROUP CONTROLLER =====
const codeGroups = {};

function stepCodeGroup(groupId, direction) {
  const g = codeGroups[groupId];
  if (!g) return;
  
  const newStep = g.currentStep + direction;
  if (newStep < 0 || newStep >= g.steps.length) return;
  g.currentStep = newStep;
  
  const step = g.steps[newStep];
  
  // Update CODER — highlight active line
  if (g.coderEl) {
    g.coderEl.querySelectorAll('.coder-line').forEach(l => l.classList.remove('active'));
    const activeLine = g.coderEl.querySelector(`.coder-line[data-line="${step.line}"]`);
    if (activeLine) {
      activeLine.classList.add('active');
      activeLine.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }
  
  // Update VISUALIZER — description + variables
  if (g.vizEl) {
    const desc = g.vizEl.querySelector('.viz-desc');
    const vars = g.vizEl.querySelector('.viz-vars');
    const counter = g.vizEl.querySelector('.viz-step-counter');
    
    if (desc) desc.textContent = step.description || '';
    if (counter) counter.textContent = `Step ${newStep + 1} / ${g.steps.length}`;
    
    if (vars && step.variables) {
      let vhtml = '';
      for (const [k, v] of Object.entries(step.variables)) {
        const valStr = typeof v === 'object' ? JSON.stringify(v) : String(v);
        vhtml += `<div class="viz-var"><span class="viz-var-name">${esc(k)}</span><span class="viz-var-eq">=</span><span class="viz-var-val">${esc(valStr)}</span></div>`;
      }
      vars.innerHTML = vhtml;
    } else if (vars) {
      vars.innerHTML = '';
    }
    
    // Update button states
    const prevBtn = g.vizEl.querySelector('.viz-btn-prev');
    const nextBtn = g.vizEl.querySelector('.viz-btn-next');
    if (prevBtn) prevBtn.disabled = newStep === 0;
    if (nextBtn) nextBtn.disabled = newStep === g.steps.length - 1;
  }
  
  // Update OUTPUTER — accumulated output up to current step
  if (g.outEl) {
    const body = g.outEl.querySelector('.out-body');
    if (body) {
      let output = '';
      for (let i = 0; i <= newStep; i++) {
        if (g.steps[i].output) output += g.steps[i].output + '\n';
      }
      body.innerHTML = esc(output.trimEnd()) + '<span class="out-cursor"></span>';
    }
  }
}

// ===== KATEX MATH RENDERER =====
function renderMathInEl(el) {
  if (typeof katex === 'undefined') return;
  el.querySelectorAll('.math-step-content').forEach(cell => {
    const raw = cell.getAttribute('data-latex') || cell.textContent;
    
    // The AI often outputs literal '\n' which crashes KaTeX. Split into lines.
    const lines = raw.split(/\\n|\n/);
    cell.innerHTML = '';
    
    lines.forEach(line => {
      line = line.trim();
      if (!line) return;
      
      const lineDiv = document.createElement('div');
      lineDiv.style.marginBottom = '8px';
      
      // Preserve spaces between English words in math mode by inserting explicit LaTeX spaces
      let latexLine = line.replace(/([a-zA-Z,.:\]\)]+) (?=[a-zA-Z,.:\[\(]+)/g, '$1\\ ');
      
      try {
        katex.render(latexLine, lineDiv, { displayMode: true, throwOnError: false, trust: true });
      } catch(_) {
        lineDiv.textContent = line;
      }
      cell.appendChild(lineDiv);
    });
  });
}

// ===== DIABLOCK RENDERER =====
const diaGroups = {};

function renderDiagram(svgEl, nodes, edges, highlightNodes, highlightEdges, modifiedNodes, layout) {
  const hl = new Set(highlightNodes || []);
  const hlEdge = new Set((highlightEdges || []).map(e => e.from + '->' + e.to));
  const modMap = {};
  (modifiedNodes || []).forEach(m => { modMap[m.id] = m; });

  const nw = 70, nh = 36, padX = 40, padY = 40;
  const posMap = {};
  const sizeMap = {}; // track node width for compound boxes

  // ===== LAYOUT ALGORITHMS =====
  if (layout === 'horizontal') {
    // Linked list / Queue: left → right in a row
    const gapX = 160;
    nodes.forEach((n, i) => {
      const w = (n.shape === 'compound') ? 130 : nw;
      posMap[n.id] = { x: padX + i * gapX + w/2, y: padY + 50 };
      sizeMap[n.id] = { w, h: nh };
    });
  } else if (layout === 'vertical') {
    // Stack: top → bottom
    const gapY = 90;
    nodes.forEach((n, i) => {
      posMap[n.id] = { x: padX + 100, y: padY + i * gapY + nh/2 };
      sizeMap[n.id] = { w: nw, h: nh };
    });
  } else if (layout === 'tree') {
    // Tree: BFS level placement
    const childMap = {};
    const parentSet = new Set();
    edges.forEach(e => {
      if (!childMap[e.from]) childMap[e.from] = [];
      childMap[e.from].push(e.to);
      parentSet.add(e.to);
    });
    const roots = nodes.filter(n => !parentSet.has(n.id));
    const root = roots[0] || nodes[0];
    const levels = [];
    const visited = new Set();
    let queue = [root.id];
    while (queue.length) {
      levels.push([...queue]);
      queue.forEach(id => visited.add(id));
      const next = [];
      queue.forEach(id => {
        (childMap[id] || []).forEach(c => { if (!visited.has(c)) next.push(c); });
      });
      queue = next;
    }
    // Place remaining unvisited nodes
    nodes.forEach(n => { if (!visited.has(n.id)) { levels.push([n.id]); visited.add(n.id); } });
    const gapY = 95;
    levels.forEach((level, ly) => {
      const totalW = level.length * 80;
      const startX = Math.max(padX, 200 - totalW / 2);
      level.forEach((id, lx) => {
        posMap[id] = { x: startX + lx * 80 + 30, y: padY + ly * gapY + 20 };
        sizeMap[id] = { w: nw, h: nh };
      });
    });
  } else if (layout === 'coordinate') {
    nodes.forEach(n => {
       let x = 0, y = 0;
       const m = (n.value||'').match(/\(?(-?\d+),\s*(-?\d+)\)?/);
       if (n.x !== undefined && n.y !== undefined) {
           x = Number(n.x) * 40; y = Number(n.y) * 40;
       } else if (m) {
           x = Number(m[1]) * 40; y = Number(m[2]) * 40;
       }
       posMap[n.id] = { x: Math.max(0, x) + padX, y: Math.max(0, y) + padY };
       sizeMap[n.id] = { w: 10, h: 10 };
    });
  } else {
    // Grid (default)
    const cols = Math.max(2, Math.ceil(Math.sqrt(nodes.length)));
    const gapX = 110, gapY = 95;
    nodes.forEach((n, i) => {
      const col = i % cols, row = Math.floor(i / cols);
      posMap[n.id] = { x: padX + col * gapX + nw/2, y: padY + row * gapY + nh/2 };
      sizeMap[n.id] = { w: nw, h: nh };
    });
  }

  // Bounds will be calculated after node loop to ensure precise dynamic scaling

  let svg = '<defs><marker id="dia-ah" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,4 L0,8 Z" class="dia-edge-arrow"/></marker><marker id="dia-ah-hl" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,4 L0,8 Z" class="dia-edge-arrow highlight-edge-arrow"/></marker><filter id="sketch" x="-20%" y="-20%" width="140%" height="140%"><feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/></filter></defs>';

  // Draw edges
  edges.forEach(e => {
    const from = posMap[e.from], to = posMap[e.to];
    if (!from || !to) return;
    const key = e.from + '->' + e.to;
    const isHl = hlEdge.has(key);
    const cls = isHl ? 'dia-edge highlight-edge' : 'dia-edge';
    const isPointToPoint = (nodes.find(n=>n.id===e.from)?.shape === 'point' && nodes.find(n=>n.id===e.to)?.shape === 'point');
    const markerRef = isHl ? 'dia-ah-hl' : 'dia-ah';
    const marker = (e.type !== 'line' && !isPointToPoint) ? ` marker-end="url(#${markerRef})"` : '';
    const dash = (e.type === 'dashed') ? ' stroke-dasharray="5,3"' : '';
    
    // Calculate edge start/end at node boundaries
    const dx = to.x - from.x, dy = to.y - from.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const fromS = sizeMap[e.from] || {w: nw, h: nh};
    const toS = sizeMap[e.to] || {w: nw, h: nh};
    const x1 = from.x + (dx/dist) * (fromS.w/2 + 2);
    const y1 = from.y + (dy/dist) * (fromS.h/2 + 2);
    const x2 = to.x - (dx/dist) * (toS.w/2 + 6);
    const y2 = to.y - (dy/dist) * (toS.h/2 + 6);
    
    const sketchFilter = isPointToPoint ? ' filter="url(#sketch)"' : '';
    svg += `<line class="${cls}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"${marker}${dash}${sketchFilter}/>`;
    if (e.label) {
      const mx = (from.x + to.x) / 2, my = (from.y + to.y) / 2 - 8;
      svg += `<text class="dia-edge-label" x="${mx}" y="${my}">${esc(e.label)}</text>`;
    }
  });

  // Draw nodes
  nodes.forEach(n => {
    const p = posMap[n.id];
    if (!p) return;
    const isHl = hl.has(n.id);
    const mod = modMap[n.id];
    const val = mod?.newValue !== undefined ? mod.newValue : n.value;
    const shape = n.shape || 'box';
    let extra = isHl ? ' highlight-node' : '';
    if (mod?.action === 'add') extra += ' added-node';
    if (mod?.action === 'remove') extra += ' removed-node';
    if (mod?.action === 'modify') extra += ' modified-node';

    if (shape === 'pencil' || shape === 'path') {
      const ptStr = Array.isArray(n.points) ? n.points.map(pt=>`${pt.x},${pt.y}`).join(' ') : String(n.points || '');
      svg += `<polyline points="${ptStr}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${extra}" filter="url(#sketch)"/>`;
      if (val) {
        const match = ptStr.match(/(\d+)\s*,\s*(\d+)/);
        if (match) {
           svg += `<text class="dia-node-text" x="${parseInt(match[1])}" y="${parseInt(match[2])-14}" style="font-size:12px; fill:var(--text2)">${esc(String(val))}</text>`;
        }
      }
      sizeMap[n.id] = { w: 0, h: 0 };
    } else if (shape === 'polygon') {
      const ptStr = Array.isArray(n.points) ? n.points.map(pt=>`${pt.x},${pt.y}`).join(' ') : String(n.points || '');
      svg += `<polygon points="${ptStr}" fill="rgba(10,132,255,0.15)" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" class="${extra}" filter="url(#sketch)"/>`;
      if (val) {
        const match = ptStr.match(/(\d+)\s*,\s*(\d+)/);
        if (match) {
           svg += `<text class="dia-node-text" x="${parseInt(match[1])}" y="${parseInt(match[2])-14}" style="font-size:12px; fill:var(--text2)">${esc(String(val))}</text>`;
        }
      }
      sizeMap[n.id] = { w: 0, h: 0 };
    } else if (shape === 'point') {
      svg += `<circle class="dia-node-point${extra}" cx="${p.x}" cy="${p.y}" r="4" fill="var(--accent)"/>`;
      svg += `<text class="dia-node-text" x="${p.x+10}" y="${p.y-10}" style="font-size:14px; text-anchor: start;">${esc(String(val))}</text>`;
      sizeMap[n.id] = { w: 8, h: 8 };
    } else if (shape === 'compound') {
      // Linked list node: [data | next→] 
      const cw = 130, ch = nh;
      const splitX = p.x + 20; // split point within the compound box
      svg += `<rect class="dia-node-box${extra}" x="${p.x - cw/2}" y="${p.y - ch/2}" width="${cw}" height="${ch}" rx="4"/>`;
      svg += `<line class="dia-edge" x1="${splitX}" y1="${p.y - ch/2}" x2="${splitX}" y2="${p.y + ch/2}" style="stroke-width:1"/>`;
      svg += `<text class="dia-node-text" x="${p.x - 22}" y="${p.y}" style="font-size:14px">${esc(String(val))}</text>`;
      svg += `<text class="dia-node-label" x="${splitX + 22}" y="${p.y}" style="font-size:10px;fill:#94a3b8;dominant-baseline:central">●→</text>`;
      sizeMap[n.id] = { w: cw, h: ch };
    } else if (shape === 'circle') {
      const r = nh/2 + 6;
      svg += `<circle class="dia-node-circle${extra}" cx="${p.x}" cy="${p.y}" r="${r}"/>`;
      svg += `<text class="dia-node-text" x="${p.x}" y="${p.y}" style="font-size:14px">${esc(String(val))}</text>`;
      sizeMap[n.id] = { w: r*2, h: r*2 };
    } else if (shape === 'diamond') {
      const dx = nw/2 + 10, dy = nh/2 + 10;
      svg += `<polygon class="dia-node-diamond${extra}" points="${p.x},${p.y-dy} ${p.x+dx},${p.y} ${p.x},${p.y+dy} ${p.x-dx},${p.y}"/>`;
      svg += `<text class="dia-node-text" x="${p.x}" y="${p.y}" style="font-size:14px">${esc(String(val))}</text>`;
      sizeMap[n.id] = { w: dx*2, h: dy*2 };
    } else {
      svg += `<rect class="dia-node-box${extra}" x="${p.x - nw/2}" y="${p.y - nh/2}" width="${nw}" height="${nh}" rx="6"/>`;
      svg += `<text class="dia-node-text" x="${p.x}" y="${p.y}" style="font-size:14px">${esc(String(val))}</text>`;
      sizeMap[n.id] = { w: nw, h: nh };
    }
    if (n.label) {
      svg += `<text class="dia-node-label" x="${p.x}" y="${p.y + (sizeMap[n.id]?.h || nh)/2 + 14}">${esc(n.label)}</text>`;
    }
  });

  // Calculate actual bounding box to dynamically size the block wrapper
  let maxX = 0, maxY = 0;
  
  // 1. Check standard auto-layout node positions
  Object.keys(posMap).forEach(id => {
      const p = posMap[id];
      const s = sizeMap[id] || {w: nw, h: nh};
      maxX = Math.max(maxX, p.x + s.w/2 + 30);
      maxY = Math.max(maxY, p.y + s.h/2 + 40);
  });
  
  // 2. Check explicitly drawn extreme coordinate geometry bounds
  nodes.forEach(n => {
      if ((n.shape === 'pencil' || n.shape === 'path' || n.shape === 'polygon') && n.points) {
          const ptStr = Array.isArray(n.points) ? n.points.map(pt=>`${pt.x},${pt.y}`).join(' ') : String(n.points);
          const coords = ptStr.split(/[\s,]+/).map(Number).filter(v => !isNaN(v));
          for (let i = 0; i < coords.length; i += 2) {
              if (coords[i] !== undefined) maxX = Math.max(maxX, coords[i] + 40);
              if (coords[i+1] !== undefined) maxY = Math.max(maxY, coords[i+1] + 40);
          }
      }
  });
  
  const finalW = Math.max(380, maxX);
  const finalH = Math.max(160, maxY);
  
  // Directly size the SVG to 1:1 scale to prevent tiny text shrinking
  svgEl.removeAttribute('viewBox');
  svgEl.setAttribute('width', finalW);
  svgEl.setAttribute('height', finalH);
  
  // Force the HTML wrapper to stretch, which cascades to shape-diablock width
  if (svgEl.parentElement) {
      svgEl.parentElement.style.width = finalW + 'px';
      svgEl.parentElement.style.height = finalH + 'px';
  }

  svgEl.innerHTML = svg;
}

function stepDiaBlock(groupId, direction) {
  const g = diaGroups[groupId];
  if (!g) return;
  const newStep = g.currentStep + direction;
  if (newStep < 0 || newStep >= g.steps.length) return;
  g.currentStep = newStep;
  const step = g.steps[newStep];

  // Use step-specific nodes/edges if provided, else use base
  const nodes = step.nodes || g.baseNodes;
  const edges = step.edges || g.baseEdges;
  renderDiagram(g.svgEl, nodes, edges, step.highlightNodes || [], step.highlightEdges || [], step.modifyNodes || [], g.layout);

  // Update info
  if (g.infoEl) {
    g.infoEl.querySelector('.dia-step-label').textContent = `Step ${newStep + 1}/${g.steps.length}`;
    g.infoEl.querySelector('.dia-step-desc').textContent = step.description || '';
  }

  // Update button states
  const prevBtn = g.el.querySelector('.dia-prev');
  const nextBtn = g.el.querySelector('.dia-next');
  if (prevBtn) prevBtn.disabled = newStep === 0;
  if (nextBtn) nextBtn.disabled = newStep >= g.steps.length - 1;
}

function playDiaBlock(groupId) {
  const g = diaGroups[groupId];
  if (!g) return;
  const playBtn = g.el.querySelector('.dia-play-btn');

  if (g.playTimer) {
    clearInterval(g.playTimer);
    g.playTimer = null;
    if (playBtn) { playBtn.classList.remove('playing'); playBtn.innerHTML = '▶'; }
    return;
  }

  g.currentStep = -1;
  if (playBtn) { playBtn.classList.add('playing'); playBtn.innerHTML = '⏸'; }

  g.playTimer = setInterval(() => {
    if (g.currentStep >= g.steps.length - 1) {
      clearInterval(g.playTimer);
      g.playTimer = null;
      if (playBtn) { playBtn.classList.remove('playing'); playBtn.innerHTML = '▶'; }
      return;
    }
    stepDiaBlock(groupId, 1);
  }, 1200);
}

const wrap=document.getElementById('canvas-wrap');
const world=document.getElementById('world');
const edgeSvg=document.getElementById('edge-svg');
const svgNS='http://www.w3.org/2000/svg';

const PAL=[
  {bg:'rgba(28,22,52,.95)',border:'#5a48c8',text:'#c0b4ff',badge:'#6c5adf'},
  {bg:'rgba(10,32,22,.95)',border:'#1e8060',text:'#50d498',badge:'#159858'},
  {bg:'rgba(36,16,12,.95)',border:'#aa3c18',text:'#f09070',badge:'#d04020'},
  {bg:'rgba(10,22,40,.95)',border:'#1e5890',text:'#70a8f0',badge:'#1858b8'},
  {bg:'rgba(36,26,8,.95)',border:'#a05808',text:'#f0b848',badge:'#c07010'},
];
let palIdx=0,palMap={};
function getpal(addr){if(!palMap[addr]){palMap[addr]=PAL[palIdx%PAL.length];palIdx++;}return palMap[addr];}

const explainPanel=document.getElementById('explain-panel');
const expTargetSpan=document.getElementById('exp-target');
const expTextDiv=document.getElementById('exp-text');
document.getElementById('explain-close').addEventListener('click',()=>{explainPanel.style.display='none';});
function showExplanation(title, text){
  if(!text){explainPanel.style.display='none';return;}
  expTargetSpan.innerText=title;
  expTextDiv.innerText=text;
  explainPanel.style.display='block';
}

function applyT(){
  world.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  drawEdges();drawMinimap();
}
wrap.addEventListener('mousedown',e=>{
  if(e.target===wrap||e.target===world||e.target===edgeSvg){
    isPanning=true;panStart={x:e.clientX-tx,y:e.clientY-ty};
    wrap.classList.add('grabbing');
  }
});
window.addEventListener('mousemove',e=>{
  // CSS Particle Glow Tracking
  const rect = wrap.getBoundingClientRect();
  wrap.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
  wrap.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);

  if(nodeDragging){
    const pos=screenToWorld(e.clientX,e.clientY);
    const nx=pos.x-nodeDragOff.x, ny=pos.y-nodeDragOff.y;
    nodeDragging.el.style.left=nx+'px'; nodeDragging.el.style.top=ny+'px';
    nodeDragging.x=nx; nodeDragging.y=ny;
    drawEdges(); drawMinimap();
  } else if(isPanning){
    tx=e.clientX-panStart.x; ty=e.clientY-panStart.y;
    applyT();
  }
});
window.addEventListener('mouseup',()=>{
  isPanning=false; nodeDragging=null;
  wrap.classList.remove('grabbing');
  document.querySelectorAll('.block-node').forEach(n=>n.classList.remove('dragging'));
});
wrap.addEventListener('wheel',e=>{
  // Scroll to pan the canvas naturally: vertical = up/down, horizontal/shift = left/right
  if (e.shiftKey) {
    tx -= e.deltaY;
  } else {
    tx -= e.deltaX;
    ty -= e.deltaY;
  }
  applyT();
},{passive:true});

// ===== TOUCH EVENTS FOR MOBILE =====
let activeTouches = {};
let lastTouchDist = 0;
let isTouchPanning = false;
let touchPanStart = {x:0, y:0};

wrap.addEventListener('touchstart', e => {
  const touches = e.touches;
  for (let i = 0; i < touches.length; i++) activeTouches[touches[i].identifier] = {x: touches[i].clientX, y: touches[i].clientY};

  if (touches.length === 1) {
    // On mobile: ALWAYS pan canvas (no node dragging — it's confusing on touch)
    isTouchPanning = true;
    const t = touches[0];
    touchPanStart = {x: t.clientX - tx, y: t.clientY - ty};
  } else if (touches.length === 2) {
    // Pinch-to-zoom start
    isTouchPanning = false;
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    lastTouchDist = Math.hypot(dx, dy);
  }
}, {passive: false});

wrap.addEventListener('touchmove', e => {
  e.preventDefault(); // Prevent browser scroll/zoom
  const touches = e.touches;

  if (touches.length === 1 && nodeDragging) {
    // Drag node
    const t = touches[0];
    const pos = screenToWorld(t.clientX, t.clientY);
    const nx = pos.x - nodeDragOff.x, ny = pos.y - nodeDragOff.y;
    nodeDragging.el.style.left = nx + 'px';
    nodeDragging.el.style.top = ny + 'px';
    nodeDragging.x = nx;
    nodeDragging.y = ny;
    drawEdges(); drawMinimap();
  } else if (touches.length === 1 && isTouchPanning) {
    // Pan canvas
    const t = touches[0];
    tx = t.clientX - touchPanStart.x;
    ty = t.clientY - touchPanStart.y;
    applyT();
  } else if (touches.length === 2) {
    // Pinch-to-zoom
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    if (lastTouchDist > 0) {
      const midX = (touches[0].clientX + touches[1].clientX) / 2;
      const midY = (touches[0].clientY + touches[1].clientY) / 2;
      const r = wrap.getBoundingClientRect();
      const localX = midX - r.left;
      const localY = midY - r.top;
      const zoomFactor = dist / lastTouchDist;
      const ns = Math.min(Math.max(scale * zoomFactor, 0.12), 3);
      tx = localX - (localX - tx) * (ns / scale);
      ty = localY - (localY - ty) * (ns / scale);
      scale = ns;
      applyT();
    }
    lastTouchDist = dist;
  }
}, {passive: false});

wrap.addEventListener('touchend', e => {
  const touches = e.changedTouches;
  for (let i = 0; i < touches.length; i++) delete activeTouches[touches[i].identifier];
  if (e.touches.length === 0) {
    isTouchPanning = false;
    nodeDragging = null;
    lastTouchDist = 0;
    document.querySelectorAll('.block-node').forEach(n => n.classList.remove('dragging'));
  } else if (e.touches.length === 1) {
    // Went from 2 fingers to 1, restart as pan
    lastTouchDist = 0;
    isTouchPanning = true;
    touchPanStart = {x: e.touches[0].clientX - tx, y: e.touches[0].clientY - ty};
  }
}, {passive: true});

wrap.addEventListener('touchcancel', () => {
  isTouchPanning = false;
  nodeDragging = null;
  lastTouchDist = 0;
  activeTouches = {};
  document.querySelectorAll('.block-node').forEach(n => n.classList.remove('dragging'));
}, {passive: true});
function screenToWorld(sx,sy){
  const r=wrap.getBoundingClientRect();
  return{x:(sx-r.left-tx)/scale, y:(sy-r.top-ty)/scale};
}
function addZoom(d){
  const r=wrap.getBoundingClientRect();
  const cx=r.width/2,cy=r.height/2;
  const ns=Math.min(Math.max(scale+d,.12),3);
  tx=cx-(cx-tx)*(ns/scale); ty=cy-(cy-ty)*(ns/scale);
  scale=ns; applyT();
}
function resetView(){tx=60;ty=60;scale=1;applyT();}
function fitView(){
  const addrs = Object.keys(nodeData);
  if (!addrs.length) { scale = 1; applyT(); return; }
  
  // Find the first (topmost) block node to center on
  let topNode = null;
  let topY = Infinity;
  addrs.forEach(a => {
    const n = nodeData[a];
    if (n.y < topY) { topY = n.y; topNode = n; }
  });
  
  if (!topNode) { scale = 1; applyT(); return; }
  
  const vw = wrap.clientWidth;
  const vh = wrap.clientHeight;
  
  // Use a comfortable readable scale — not too zoomed in, not too small
  scale = vw < 600 ? 0.75 : 0.85;
  
  // Center the top node horizontally, place it near the top with some padding
  tx = (vw / 2) - (topNode.x + topNode.w / 2) * scale;
  ty = 40 - topNode.y * scale; // 40px from top
  applyT();
}

window.addEventListener('message', (event) => {
  if(event.data && event.data.type === 'CLEAR_ROADMAP') {
    // Remove all block nodes from DOM
    world.querySelectorAll('.block-node').forEach(n => n.remove());
    // Clear SVG arrows
    const svg = document.querySelector('svg');
    if (svg) svg.innerHTML = '';
    // Reset internal state
    nodeData = {};
    edges = [];
    palIdx = 0;
    palMap = {};
    // Clear the arrow canvas
    const canvas = document.getElementById('arrowCanvas');
    if (canvas) {
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
  if(event.data && event.data.type === 'LOAD_ROADMAP') {
    renderTree(event.data.payload, event.data.isPartial);
  }
});

function renderTree(data, isPartial = false){
  if(!Array.isArray(data)){console.error('Expected JSON array.');return;}
  palIdx=0; palMap={}; 
  
  // Save previous node data and elements for smart diffing!
  const prevData = nodeData;
  nodeData = {}; 
  edges=[];
  
  const existingEls = new Map();
  world.querySelectorAll('.block-node:not(#gen-node)').forEach(n => existingEls.set(n.dataset.addr, n));
  
  edgeSvg.innerHTML='';
  explainPanel.style.display='none';

  const blocks=data.filter(n=>n&& (n.type==='block' || n.type==='textblock' || n.type==='coder' || n.type==='visualizer' || n.type==='outputer' || n.type==='mathblock' || n.type==='diablock' || n.type === 'graphblock'));
  const arrowDefs=data.filter(n=>n&&n.type==='arrow');
  if(!blocks.length)return;
  const blockMap={};
  blocks.forEach(b=>blockMap[b.address]=b);
  const arrowExplanationMap={};
  arrowDefs.forEach(a=>{const key=`${a['first-connection']}->${a['next-connection']}`;arrowExplanationMap[key]=a.explanation || a['in-content'] || '';});
  
  const hasParent=new Set();
  const dirAdj = {};
  blocks.forEach(b => { dirAdj[b.address] = []; });
  blocks.forEach(b => {
     (b.connect||[]).forEach(child => {
         if(!dirAdj[b.address]) dirAdj[b.address]=[];
         dirAdj[b.address].push(child);
         hasParent.add(child);
     });
  });

  // 1. Weakly Connected Components (Disjoint Sets) to group separate sub-trees
  const adj = {};
  blocks.forEach(b => { adj[b.address] = []; });
  blocks.forEach(b => {
     (b.connect||[]).forEach(c => {
         if(!adj[b.address]) adj[b.address] = [];
         if(!adj[c]) adj[c] = [];
         adj[b.address].push(c);
         adj[c].push(b.address);
     });
  });

  const forest = [];
  const visited = new Set();
  blocks.forEach(b => {
     if(!visited.has(b.address)) {
        const comp = [];
        const q = [b.address];
        visited.add(b.address);
        while(q.length){
           const cur = q.shift();
           comp.push(cur);
           (adj[cur]||[]).forEach(nbr => {
               if(!visited.has(nbr)){ visited.add(nbr); q.push(nbr); }
           });
        }
        forest.push(comp);
     }
  });

  let globalOffsetY = 100; // Start at 100px to completely clear the overarching React App UI header!
  const centerX = Math.max((wrap.clientWidth / 2) - 110, 60);

  forest.forEach((compAddrs) => {
      let compRoots = compAddrs.filter(a => !hasParent.has(a));
      if(compRoots.length === 0) compRoots = [compAddrs[0]];

      // DFS Placement
      function placeNode(addr, currentX, fixedY = null) {
          if (visitedPlacement.has(addr)) return;
          visitedPlacement.add(addr);

          const b = blockMap[addr];
          if(!b) return;

          let blockW = (b.type==='textblock') ? 310 : 220;
          let blockH = 120;
          if (b.type === 'textblock') {
             const contentLen = (b.content || '').length;
             blockH = Math.max(160, Math.min(400, 80 + contentLen * 0.9));
          } else if (b.type === 'coder') {
             blockW = 420;
             const lines = (b.code || '').split('\n').length;
             blockH = Math.max(180, Math.min(500, 60 + lines * 22));
          } else if (b.type === 'visualizer') {
             blockW = 380;
             blockH = 280;
          } else if (b.type === 'outputer') {
             blockW = 360;
             blockH = 200;
          } else if (b.type === 'mathblock') {
             blockW = 440;
             const stepCount = (b.steps || []).length;
             blockH = Math.max(200, 70 + stepCount * 55);
          } else if (b.type === 'graphblock') {
             blockW = 500;
             blockH = 400;
          } else if (b.type === 'diablock') {
             blockW = 460;
             const nodeCount = (b.nodes || []).length;
             const rows = Math.ceil(nodeCount / Math.max(2, Math.ceil(Math.sqrt(nodeCount))));
             blockH = Math.max(280, 90 + rows * 70 + 80);
          } else if (b.shape === 'circle') {
             blockH = 220;
          } else if (b.shape === 'star') {
             blockH = 280;
          }

          // All nodes respect horizontal overrides while expanding the vertical page bounds
          const x = (b.type === 'coder') ? 60 : currentX;
          const y = (fixedY !== null) ? fixedY : globalOffsetY;
          if (y + blockH + 80 > globalOffsetY) {
              globalOffsetY = y + blockH + 80;
          }

          const c = getpal(b.address);
          const initials = (b.address||'??').slice(0,2).toUpperCase();
          const explanation = b.explanation || '';
          
          let el = existingEls.get(b.address);
          const isNew = !el;
          
          if (isNew) {
             el = document.createElement('div');
             world.appendChild(el);
          } else {
             existingEls.delete(b.address); 
          }
          
          el.dataset.addr=b.address;
          el.style.cssText=`left:${x}px;top:${y}px;width:max-content;min-width:${blockW}px;max-width:900px; transition: left 0.3s ease, top 0.3s ease;`;
          if (isNew) el.style.animation=`nodeIn .45s cubic-bezier(.34,1.4,.64,1) both`;
          
          let innerHtml = '';
          if (b.type === 'coder') {
             // === CODER BLOCK ===
             el.className = 'block-node shape-coder';
             el.style.background = '';
             const codeLines = (b.code || '').split('\n');
             const groupId = b.group || b.address;
             let linesHtml = '';
             codeLines.forEach((line, i) => {
               const lineNum = i + 1;
               const isFirst = i === 0;
               linesHtml += `<div class="coder-line${isFirst ? ' active' : ''}" data-line="${lineNum}"><div class="coder-pointer"><span class="arrow">▶</span></div><div class="coder-line-num">${lineNum}</div><div class="coder-line-code">${esc(line)}</div></div>`;
             });
             innerHtml = `
               <div class="coder-header">
                 <span class="coder-lang">${esc(b.language || 'code')}</span>
                 <span class="coder-label">📝 Coder</span>
               </div>
               <div class="coder-body">${linesHtml}</div>`;
             // Register in code group
             if (!codeGroups[groupId]) codeGroups[groupId] = { currentStep: 0, steps: [] };
             codeGroups[groupId].coderEl = el;

          } else if (b.type === 'visualizer') {
             // === VISUALIZER BLOCK ===
             el.className = 'block-node shape-visualizer';
             el.style.background = '';
             const groupId = b.group || b.coder_ref || b.address;
             const steps = b.steps || [];
             const firstStep = steps[0] || {};
             let varsHtml = '';
             if (firstStep.variables) {
               for (const [k, v] of Object.entries(firstStep.variables)) {
                 const valStr = typeof v === 'object' ? JSON.stringify(v) : String(v);
                 varsHtml += `<div class="viz-var"><span class="viz-var-name">${esc(k)}</span><span class="viz-var-eq">=</span><span class="viz-var-val">${esc(valStr)}</span></div>`;
               }
             }
             innerHtml = `
               <div class="viz-header">
                 <span class="viz-title">🔍 Visualizer</span>
                 <span class="viz-step-counter">Step 1 / ${steps.length}</span>
               </div>
               <div class="viz-body">
                 <div class="viz-desc">${esc(firstStep.description || 'Click Next to step through...')}</div>
                 <div class="viz-vars">${varsHtml}</div>
               </div>
               <div class="viz-controls">
                 <button class="viz-btn viz-btn-prev" disabled onclick="stepCodeGroup('${groupId}', -1)">◀ Prev</button>
                 <button class="viz-btn viz-btn-next" onclick="stepCodeGroup('${groupId}', 1)">Next ▶</button>
               </div>`;
             // Register in code group
             if (!codeGroups[groupId]) codeGroups[groupId] = { currentStep: 0, steps: [] };
             codeGroups[groupId].steps = steps;
             codeGroups[groupId].vizEl = el;

          } else if (b.type === 'outputer') {
             // === OUTPUTER BLOCK ===
             el.className = 'block-node shape-outputer';
             el.style.background = '';
             const groupId = b.group || b.visualizer_ref || b.address;
             innerHtml = `
               <div class="out-header">
                 <span class="out-title">📺 Output</span>
               </div>
               <div class="out-body"><span class="out-cursor"></span></div>`;
             // Register in code group
             if (!codeGroups[groupId]) codeGroups[groupId] = { currentStep: 0, steps: [] };
             codeGroups[groupId].outEl = el;

          } else if (b.type === 'graphblock') {
             // === GRAPHBLOCK ===
             el.className = 'block-node shape-graphblock';
             el.style.background = '';
             const cid = 'chart-' + b.address;
             innerHtml = `
               <div class="graph-header">
                 <span class="graph-title">${esc(b.title || 'Data Visualization')}</span>
                 <span class="graph-icon"><i class="fas fa-chart-line"></i> Chart</span>
               </div>
               <div class="graph-body">
                 <canvas id="${cid}"></canvas>
               </div>`;
               
          } else if (b.type === 'mathblock') {
             // === MATHBLOCK ===
             el.className = 'block-node shape-mathblock';
             el.style.background = '';
             const steps = b.steps || [];
             let stepsHtml = '';
             steps.forEach(s => {
               const labelLower = (s.label || '').toLowerCase();
               const labelClass = labelLower.includes('given') ? 'given' : (labelLower.includes('answer') || labelLower.includes('result') || labelLower.includes('final')) ? 'answer' : '';
               stepsHtml += `<div class="math-step"><div class="math-step-label ${labelClass}">${esc(s.label || '')}</div><div class="math-step-content" data-latex="${esc(s.content || '')}">${esc(s.content || '')}</div></div>`;
             });
             const stepCount = steps.length;
             innerHtml = `
               <div class="math-header">
                 <span class="math-title">${esc(b.title || 'Solution')}</span>
                 <span class="math-icon">∑ Math</span>
               </div>
               <div class="math-body">${stepsHtml}</div>
               <div class="math-footer">
                 <span class="math-footer-text">${stepCount} steps</span>
                 <button class="tf-speak-btn" onclick="speakNodeText('${esc(steps.map(s => s.label + ': ' + s.content).join('. '))}')">🔊</button>
               </div>`;

          } else if (b.type === 'diablock') {
             // === DIABLOCK (Diagram) ===
             el.className = 'block-node shape-diablock';
             el.style.background = '';
             const gid = b.address;
             const nodes = b.nodes || [];
             const edgesDia = b.edges || [];
             const steps = b.steps || [];
             const cols = Math.max(2, Math.ceil(Math.sqrt(nodes.length)));
             const diaRows = Math.ceil(nodes.length / cols);
             const svgH = 60 + diaRows * 70 + 30;
             innerHtml = `
               <div class="dia-header">
                 <div><span class="dia-title">${esc(b.title || 'Data Structure')}</span></div>
                 <div class="dia-controls">
                   <button class="dia-step-btn dia-prev" disabled onclick="stepDiaBlock('${gid}', -1)">◀</button>
                   <button class="dia-play-btn" onclick="playDiaBlock('${gid}')">▶</button>
                   <button class="dia-step-btn dia-next" onclick="stepDiaBlock('${gid}', 1)" ${steps.length === 0 ? 'disabled' : ''}>▶▶</button>
                 </div>
               </div>
               <div class="dia-canvas"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 ${svgH}"></svg></div>
               <div class="dia-info">
                 <span class="dia-step-label">Ready</span>
                 <span class="dia-step-desc">${steps.length ? esc(steps[0]?.description || 'Press ▶ to animate') : 'Static diagram'}</span>
               </div>
               <div class="dia-footer">
                 <span class="dia-footer-text">${nodes.length} nodes · ${edgesDia.length} edges · ${steps.length} steps</span>
                 <span class="dia-badge">◈ Diagram</span>
               </div>`;
             // Register group (will init SVG after innerHTML set)
             const diaLayout = b.layout || 'grid';
             diaGroups[gid] = { currentStep: -1, steps, baseNodes: nodes, baseEdges: edgesDia, el, svgEl: null, infoEl: null, playTimer: null, layout: diaLayout };

          } else if (b.type === 'textblock') {
             el.className = `block-node shape-text-field`;
             el.style.background = '';
             innerHtml = `
              <div class="node-head">
                <div class="node-addr">${esc(b.title || b.address || 'Definition')}</div>
                <button class="tf-speak-btn" onclick="speakNodeText('${esc(b.content||'')}')">🔊</button>
              </div>
              <div class="node-body">
                <div class="node-content" style="text-align:left;">${esc(b.content||'')}</div>
              </div>`;
          } else {
             const shapeClass = b.shape ? `shape-${b.shape}` : '';
             el.className = `block-node ${shapeClass}`;
             el.style.background = ''; 
             innerHtml = `
                 <div class="node-head" style="background:${c.bg}">
                   <div class="node-badge" style="background:${c.badge}">${esc(initials)}</div>
                   <div class="node-addr" style="color:${c.text}">${esc(b.address)}</div>
                 </div>
                 <div class="node-body">
                   <div class="node-content">${esc(b['in-content']||'')}</div>
                   ${explanation ? `<div class="node-explanation-badge" data-exp="${Math.random()}">📖 explain</div>` : ''}
                 </div>`;
          }
          
          el.innerHTML = innerHtml;
          
          // Render KaTeX math for mathblocks
          if (b.type === 'mathblock') {
            setTimeout(() => renderMathInEl(el), 50);
          }
          
          // Initialize Graphblock Chart
          if (b.type === 'graphblock') {
             setTimeout(() => {
                const ctx = document.getElementById('chart-' + b.address);
                if (ctx && typeof Chart !== 'undefined') {
                    Chart.defaults.color = '#7a85a8';
                    Chart.defaults.font.family = "'JetBrains Mono', monospace";
                    
                    const chartConfig = b.chartData || {
                        type: b.chartType || 'bar',
                        data: {
                            labels: b.labels || [],
                            datasets: (b.datasets || []).map((ds, i) => {
                                const isLine = (b.chartType === 'line' || ds.type === 'line' || b.chartData?.type === 'line');
                                const colors = ['#0a84ff', '#3ecb8e', '#f0ad5e', '#f05858', '#5e5ce6'];
                                const c = colors[i % colors.length];
                                return {
                                    tension: isLine ? 0.4 : 0,
                                    fill: ds.fill || false,
                                    ...ds,
                                    backgroundColor: ds.backgroundColor || (isLine ? 'transparent' : c + '80'),
                                    borderColor: ds.borderColor || c,
                                    borderWidth: ds.borderWidth || 2,
                                    pointBackgroundColor: ds.pointBackgroundColor || c
                                };
                            })
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: true, labels: { color: '#d8ddef', font: { size: 10 } } }
                            },
                            scales: {
                                y: { beginAtZero: true, grid: { color: '#2a304a' }, ticks: { color: '#7a85a8' } },
                                x: { grid: { color: '#2a304a' }, ticks: { color: '#7a85a8' } }
                            }
                        }
                    };
                    if (b.options) chartConfig.options = { ...chartConfig.options, ...b.options };
                    new Chart(ctx, chartConfig);
                }
             }, 80);
          }
          
          // Initialize diablock SVG
          if (b.type === 'diablock') {
            setTimeout(() => {
              const g = diaGroups[b.address];
              if (g) {
                g.svgEl = el.querySelector('.dia-canvas svg');
                g.infoEl = el.querySelector('.dia-info');
                if (g.svgEl) renderDiagram(g.svgEl, g.baseNodes, g.baseEdges, [], [], [], g.layout);
              }
            }, 60);
          }
          
          if (isNew) {
            el.addEventListener('mousedown',ev=>{
              ev.stopPropagation();
              const n=nodeData[b.address];
              if(!n)return;
              const wp=screenToWorld(ev.clientX,ev.clientY);
              nodeDragging=n; el.classList.add('dragging');
              nodeDragOff={x:wp.x-n.x, y:wp.y-n.y};
            });
          }
          
          if(explanation && b.type !== 'textblock'){
            const badgeDiv=el.querySelector('.node-explanation-badge');
            if(badgeDiv) badgeDiv.addEventListener('click',(ev)=>{ev.stopPropagation();showExplanation(`node: ${b.address}`, explanation);});
          }
          
          nodeData[b.address] = {x, y, w:blockW, h:blockH, el, color:c, explanation:explanation, type: b.type};
          
          // Separate children into textblocks (horizontal) and regular blocks (vertical)
          const children = dirAdj[addr] || [];
          const textChildren = children.filter(c => blockMap[c] && blockMap[c].type === 'textblock');
          const blockChildren = children.filter(c => !blockMap[c] || blockMap[c].type !== 'textblock');
          
          // Place textblocks HORIZONTALLY to the right, stacked vertically with generous spacing
          let tbOffsetY = y; // start at same Y as parent
          textChildren.forEach(childAddr => {
              if (visitedPlacement.has(childAddr)) return;
              visitedPlacement.add(childAddr);
              const cb = blockMap[childAddr];
              if(!cb) return;
              const tbW = 310;
              // Estimate height from content length
              const contentLen = (cb.content || '').length;
              const tbH = Math.max(160, Math.min(400, 80 + contentLen * 0.9));
              const tbX = x + blockW + 120; // generous horizontal gap
              const tbY = tbOffsetY;
              tbOffsetY += tbH + 40; // generous vertical gap between textblocks
              
              const cc = getpal(cb.address);
              let tbEl = existingEls.get(cb.address);
              const tbIsNew = !tbEl;
              if (tbIsNew) { tbEl = document.createElement('div'); world.appendChild(tbEl); }
              else { existingEls.delete(cb.address); }
              
              tbEl.dataset.addr = cb.address;
              tbEl.className = 'block-node shape-text-field';
              tbEl.style.cssText = `left:${tbX}px;top:${tbY}px;width:${tbW}px; transition: left 0.3s ease, top 0.3s ease;`;
              if (tbIsNew) tbEl.style.animation = 'nodeIn .45s cubic-bezier(.34,1.4,.64,1) both';
              tbEl.innerHTML = `
                <div class="node-head">
                  <div class="node-addr">${esc(cb.title || cb.address || 'Definition')}</div>
                  <button class="tf-speak-btn" onclick="speakNodeText('${esc(cb.content||'')}')">🔊</button>
                </div>
                <div class="node-body">
                  <div class="node-content" style="text-align:left;">${esc(cb.content||'')}</div>
                </div>`;
              if (tbIsNew) {
                tbEl.addEventListener('mousedown', ev => {
                  ev.stopPropagation();
                  const n = nodeData[cb.address]; if(!n) return;
                  const wp = screenToWorld(ev.clientX, ev.clientY);
                  nodeDragging = n; tbEl.classList.add('dragging');
                  nodeDragOff = {x: wp.x - n.x, y: wp.y - n.y};
                });
              }
              nodeData[cb.address] = {x: tbX, y: tbY, w: tbW, h: tbH, el: tbEl, color: cc, explanation: '', type: 'textblock', parentAddr: addr};
              // Make sure globalOffsetY accounts for tall textblock stacks
              if (tbOffsetY > globalOffsetY) globalOffsetY = tbOffsetY;
          });
          });

          // Place regular block children
          let codeSeqX = (b.type === 'coder') ? 60 + blockW + 60 : x + blockW + 60;
          
          blockChildren.forEach(childAddr => {
              const cb = blockMap[childAddr];
              if (cb && (cb.type === 'visualizer' || cb.type === 'outputer')) {
                  placeNode(childAddr, codeSeqX, y);
              } else {
                  placeNode(childAddr, centerX);
              }
          });
      }

      const visitedPlacement = new Set();
      compRoots.forEach(r => placeNode(r, centerX));
      
      globalOffsetY += 80; // gap between disconnected graphs
  });

  // Render a 'Generating' node at the very bottom, centered
  let generatingEl = document.getElementById('gen-node');
  if (isPartial) {
      if(!generatingEl) {
          generatingEl = document.createElement('div');
          generatingEl.id = 'gen-node';
          generatingEl.className = 'block-node';
          generatingEl.innerHTML = `<div class="node-body" style="padding:15px; color:var(--accent); font-weight:600;">⏳ Generating Tree...</div>`;
          world.appendChild(generatingEl);
      }
      generatingEl.style.cssText = `left:${centerX}px;top:${globalOffsetY}px;width:220px; transition: top 0.3s ease; animation: nodePulse 1.5s infinite alternate; border-color: var(--accent); white-space: nowrap;`;
  } else if (generatingEl) {
      generatingEl.remove();
  }

  // Cleanup stale deleted elements
  existingEls.forEach(el => el.remove());
  blocks.forEach(b=>{
    (b.connect||[]).forEach(child=>{
      const key=`${b.address}->${child}`;
      const arrowLabelRaw=arrowDefs.find(a=>a['first-connection']===b.address && a['next-connection']===child)?.['in-content']||'';
      edges.push({from:b.address,to:child,label:arrowLabelRaw,explanation:arrowExplanationMap[key] || ''});
    });
  });
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    // ===== FULL POST-RENDER RELAYOUT (Force-Directed + Collision) =====
    // Step 1: Measure ALL actual DOM sizes
    blocks.forEach(b=>{
      const el=nodeData[b.address]?.el;
      if(el) { 
        nodeData[b.address].h = el.offsetHeight; 
        nodeData[b.address].w = el.offsetWidth;
      }
    });
    
    // Step 2: Separate textblocks from main nodes
    const tbGroups = {}; 
    const blockNodes = []; 
    Object.keys(nodeData).forEach(addr => {
      const nd = nodeData[addr];
      if (nd.type === 'textblock' && nd.parentAddr) {
        if (!tbGroups[nd.parentAddr]) tbGroups[nd.parentAddr] = [];
        tbGroups[nd.parentAddr].push(addr);
      } else if (nd.type !== 'textblock') {
        blockNodes.push(addr);
      }
    });

    // ===== STRICT TOP-TO-BOTTOM SEQUENTIAL LAYOUT =====
    // Sort block nodes natively by their initial stream generation Y position
    // This perfectly preserves the organic AI generation order (Definition -> Diagram -> Code)
    const flatOrder = [...blockNodes];
    flatOrder.sort((a, b) => nodeData[a].y - nodeData[b].y);

    // Position nodes exclusively top-to-bottom sequentially
    let currentY = 100;
    const ROW_GAP = 90;
    const TB_GAP_X = 60;
    const TB_GAP_Y = 24;

    flatOrder.forEach(addr => {
        const nd = nodeData[addr];
        const tbs = tbGroups[addr] || [];
        
        let tbMaxWidth = 0;
        tbs.forEach(tbAddr => { tbMaxWidth = Math.max(tbMaxWidth, nodeData[tbAddr].w); });
        
        // Center the whole unit (node + textblocks) horizontally for a clean column
        let totalRowW = nd.w;
        if (tbs.length > 0) totalRowW += TB_GAP_X + tbMaxWidth;
        const startX = centerX - totalRowW / 2;
        
        // 1. Place the main block node
        nd.x = startX;
        nd.y = currentY;
        nd.el.style.left = nd.x + 'px';
        nd.el.style.top = nd.y + 'px';
        
        // 2. Place its textblocks to the right
        let tbY = currentY;
        let tbMaxH = 0;
        const rightEdge = nd.x + nd.w;
        
        tbs.forEach(tbAddr => {
            const tb = nodeData[tbAddr];
            tb.x = rightEdge + TB_GAP_X;
            tb.y = tbY;
            tb.el.style.left = tb.x + 'px';
            tb.el.style.top = tb.y + 'px';
            tbY += tb.h + TB_GAP_Y;
        });
        
        tbMaxH = tbs.length > 0 ? (tbY - currentY - TB_GAP_Y) : 0;
        const rowHeight = Math.max(nd.h, tbMaxH);
        
        // Move fully down for the next block (NO SIDE BY SIDE)
        currentY += rowHeight + ROW_GAP;
    });
    
    window.lastFlatOrder = flatOrder;
    drawEdges(flatOrder);
    if (!isPartial) { fitView(); }
    drawMinimap();
  }));
}

function drawEdges(flatOrder){
  flatOrder = flatOrder || window.lastFlatOrder;
  edgeSvg.innerHTML='';
  if(!edges.length)return;
  const defs=document.createElementNS(svgNS,'defs');
  // Arrowhead marker — clean chevron style
  defs.innerHTML=`<marker id="ah" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
    <path d="M2 2L10 6L2 10" fill="none" stroke="#5a7aef" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ah-tb" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M2 2L10 6L2 10" fill="none" stroke="#4cc9a0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>`;
  edgeSvg.appendChild(defs);
  edges.forEach(e=>{
    const fn=nodeData[e.from], tn=nodeData[e.to];
    if(!fn||!tn)return;
    
    const path=document.createElementNS(svgNS,'path');
    let d;
    let startX = 0, startY = 0, endX = 0, endY = 0;
    
    if (tn.type === 'textblock') {
      startX = fn.x + fn.w;
      startY = fn.y + fn.h / 2;
      endX = tn.x;
      endY = tn.y + tn.h / 2;
      const cpOffset = (endX - startX) * 0.5;
      d = `M${startX},${startY} C${startX + cpOffset},${startY} ${endX - cpOffset},${endY} ${endX},${endY}`;
      path.setAttribute('stroke', 'rgba(76, 201, 160, 0.5)');
      path.setAttribute('stroke-width', '1.8');
      path.setAttribute('stroke-dasharray', '8,5');
      path.setAttribute('marker-end', 'url(#ah-tb)');
    } else {
      const c1x = fn.x + fn.w/2, c1y = fn.y + fn.h/2;
      const c2x = tn.x + tn.w/2, c2y = tn.y + tn.h/2;
      const dx = c2x - c1x, dy = c2y - c1y;
      
      let cpx1, cpy1, cpx2, cpy2;
      if (Math.abs(dx) > Math.abs(dy) * 1.5) { 
          if (dx > 0) { 
              startX = fn.x + fn.w; startY = c1y;
              endX = tn.x; endY = c2y;
          } else { 
              startX = fn.x; startY = c1y;
              endX = tn.x + tn.w; endY = c2y;
          }
          cpx1 = startX + dx * 0.4; cpy1 = startY;
          cpx2 = endX - dx * 0.4; cpy2 = endY;
      } else { 
          if (dy > 0) { 
              startX = c1x; startY = fn.y + fn.h;
              endX = c2x; endY = tn.y;
          } else { 
              startX = c1x; startY = fn.y;
              endX = c2x; endY = tn.y + tn.h;
          }
          cpx1 = startX; cpy1 = startY + dy * 0.4;
          cpx2 = endX; cpy2 = endY - dy * 0.4;
      }
      
      d = `M${startX},${startY} C${cpx1},${cpy1} ${cpx2},${cpy2} ${endX},${endY}`;
      path.setAttribute('stroke', 'rgba(90, 122, 239, 0.55)');
      path.setAttribute('stroke-width', '2');
      path.setAttribute('marker-end', 'url(#ah)');
    }
    
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    edgeSvg.appendChild(path);
    
    // Connection dot at the start point
    const dot = document.createElementNS(svgNS, 'circle');
    dot.setAttribute('cx', startX);
    dot.setAttribute('cy', startY);
    dot.setAttribute('r', '5');
    dot.setAttribute('fill', tn.type === 'textblock' ? 'rgba(76, 201, 160, 0.7)' : 'rgba(90, 122, 239, 0.7)');
    edgeSvg.appendChild(dot);
    
    // Small arrival dot at the end point
    const dotEnd = document.createElementNS(svgNS, 'circle');
    dotEnd.setAttribute('cx', endX);
    dotEnd.setAttribute('cy', endY);
    dotEnd.setAttribute('r', '3');
    dotEnd.setAttribute('fill', tn.type === 'textblock' ? 'rgba(76, 201, 160, 0.5)' : 'rgba(90, 122, 239, 0.5)');
    edgeSvg.appendChild(dotEnd);
  });
  const addrs=Object.keys(nodeData);
  if(addrs.length){
    let mx=-Infinity,my=-Infinity;
    addrs.forEach(a=>{const n=nodeData[a];mx=Math.max(mx,n.x+n.w);my=Math.max(my,n.y+n.h);});
    edgeSvg.setAttribute('width',mx+300); edgeSvg.setAttribute('height',my+300);
  }
}

function drawMinimap(){
  const mc=document.getElementById('mm-canvas');
  const mw=mc.offsetWidth, mh=mc.offsetHeight;
  mc.width=mw*2; mc.height=mh*2;
  const ctx=mc.getContext('2d');
  ctx.scale(2,2);
  ctx.clearRect(0,0,mw,mh);
  const addrs=Object.keys(nodeData);
  if(!addrs.length)return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  addrs.forEach(a=>{const n=nodeData[a];minX=Math.min(minX,n.x);minY=Math.min(minY,n.y);maxX=Math.max(maxX,n.x+n.w);maxY=Math.max(maxY,n.y+n.h);});
  const pad=8;
  const rw=maxX-minX||1, rh=maxY-minY||1;
  const sc=Math.min((mw-pad*2)/rw,(mh-pad*2)/rh);
  const ox=(mw-(rw*sc))/2-minX*sc;
  const oy=(mh-(rh*sc))/2-minY*sc;
  ctx.strokeStyle='#3a4a80'; ctx.lineWidth=.8;
  edges.forEach(e=>{const fn=nodeData[e.from],tn=nodeData[e.to]; if(!fn||!tn)return;ctx.beginPath();ctx.moveTo(fn.x*sc+ox+fn.w*sc/2, fn.y*sc+oy+fn.h*sc);ctx.lineTo(tn.x*sc+ox+tn.w*sc/2, tn.y*sc+oy);ctx.stroke();});
  addrs.forEach(a=>{const n=nodeData[a];ctx.fillStyle=n.color.badge+'55';ctx.strokeStyle=n.color.border;ctx.lineWidth=.8;ctx.beginPath();ctx.roundRect(n.x*sc+ox,n.y*sc+oy,n.w*sc,n.h*sc,3);ctx.fill();ctx.stroke();});
  const vr=wrap.getBoundingClientRect();
  const vx=(-tx/scale)*sc+ox, vy=(-ty/scale)*sc+oy, vw=(vr.width/scale)*sc, vh=(vr.height/scale)*sc;
  ctx.strokeStyle='rgba(79,126,240,.7)'; ctx.lineWidth=1; ctx.strokeRect(vx,vy,vw,vh);
}
document.getElementById('minimap').addEventListener('click',e=>{
  const mc=document.getElementById('mm-canvas');
  const mr=mc.getBoundingClientRect();
  const addrs=Object.keys(nodeData); if(!addrs.length)return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  addrs.forEach(a=>{const n=nodeData[a];minX=Math.min(minX,n.x);minY=Math.min(minY,n.y);maxX=Math.max(maxX,n.x+n.w);maxY=Math.max(maxY,n.y+n.h);});
  const mw=mc.offsetWidth,mh=mc.offsetHeight,pad=8;
  const rw=maxX-minX||1,rh=maxY-minY||1;
  const sc2=Math.min((mw-pad*2)/rw,(mh-pad*2)/rh);
  const ox=(mw-(rw*sc2))/2-minX*sc2, oy=(mh-(rh*sc2))/2-minY*sc2;
  const cx=(e.clientX-mr.left-ox)/sc2, cy=(e.clientY-mr.top-oy)/sc2;
  const vr=wrap.getBoundingClientRect();
  tx=vr.width/2-cx*scale; ty=vr.height/2-cy*scale;
  applyT();
});

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
applyT();

window.addEventListener('message', e => {
  if (e.data && e.data.type === 'SET_THEME') {
    if (e.data.payload === 'light') document.body.classList.add('light-theme');
    else document.body.classList.remove('light-theme');
  } else if (e.data && e.data.type === 'MOUSE_MOVE') {
    const wrap = document.getElementById('canvas-wrap');
    if (wrap) {
      const rect = wrap.getBoundingClientRect();
      wrap.style.setProperty('--mouse-x', `${e.data.payload.x - rect.left}px`);
      wrap.style.setProperty('--mouse-y', `${e.data.payload.y - rect.top}px`);
    }
  }
});

window.parent.postMessage('READY', '*');
</script>
